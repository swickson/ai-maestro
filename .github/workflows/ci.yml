name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: yarn test

      - name: Build
        run: |
          mkdir -p data
          touch data/.help-build-success
          yarn build

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

  # Smoke-test the reprovision-sweep tool actually STARTS + runs (dry-run, exit 0).
  # The unit tests cover the planner LIB, not the tool's INVOCATION — that gap let
  # a run-failure ship twice (#265 @/ alias, #266 node-24 ESM named-export). node 24
  # is included deliberately: its strict ESM is where the named-export failure lived
  # and the node-20/22 test matrix could not catch it. No registry exists in CI, so
  # loadAgents() returns [] and the dry-run prints a 0-agent plan and exits 0.
  reprovision-sweep-smoke:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Smoke — reprovision-sweep starts and runs (dry-run, exit 0)
        run: yarn reprovision-sweep
